<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthesia Bloom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
    }
    #start-overlay h1 {
      color: #fff;
      font-family: Georgia, serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ff6b9d, #c44cff, #6bffb8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #start-overlay p {
      color: #888;
      font-family: system-ui, sans-serif;
      font-size: 1.1rem;
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="start-overlay">
    <h1>Synesthesia Bloom</h1>
    <p class="pulse">Click anywhere to begin</p>
    <p style="margin-top: 2rem; color: #555; font-size: 0.9rem;">Microphone access required</p>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
